<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ChasquiMoto - Movilidad Sostenible</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#004ac6","on-primary": "#ffffff","primary-container": "#2563eb","on-primary-container": "#eeefff",
        "secondary": "#545f73","on-secondary": "#ffffff","secondary-container": "#d5e0f8","on-secondary-container": "#586377",
        "tertiary": "#943700","on-tertiary": "#ffffff","tertiary-container": "#bc4800","on-tertiary-container": "#ffede6",
        "error": "#ba1a1a","on-error": "#ffffff","error-container": "#ffdad6","on-error-container": "#93000a",
        "background": "#faf8ff","on-background": "#191b23","surface": "#faf8ff","on-surface": "#191b23",
        "surface-dim": "#d9d9e5","surface-bright": "#faf8ff","surface-container-lowest": "#ffffff",
        "surface-container-low": "#f3f3fe","surface-container": "#ededf9","surface-container-high": "#e7e7f3",
        "surface-container-highest": "#e1e2ed","on-surface-variant": "#434655","inverse-surface": "#2e3039",
        "inverse-on-surface": "#f0f0fb","inverse-primary": "#b4c5ff","outline": "#737686","outline-variant": "#c3c6d7",
        "surface-tint": "#0053db","surface-variant": "#e1e2ed","primary-fixed": "#dbe1ff","primary-fixed-dim": "#b4c5ff",
        "on-primary-fixed": "#00174b","on-primary-fixed-variant": "#003ea8","secondary-fixed": "#d8e3fb",
        "secondary-fixed-dim": "#bcc7de","on-secondary-fixed": "#111c2d","on-secondary-fixed-variant": "#3c475a",
        "tertiary-fixed": "#ffdbcd","tertiary-fixed-dim": "#ffb596","on-tertiary-fixed": "#360f00","on-tertiary-fixed-variant": "#7d2d00"
      },
      fontFamily: { "Inter": ["Inter"] },
    }
  }
}
</script>
<link href="assets/styles.css" rel="stylesheet"/>
<style>
.landing-page {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  background: #faf8ff;
  color: #191b23;
  overflow-x: hidden;
}
</style>
</head>
<body class="landing-page kinetic-bg">
<header class="fixed top-0 left-0 right-0 z-50 flex items-center justify-center h-16 md:h-20 bg-transparent">
  <h1 class="text-[24px] md:text-[40px] md:leading-[48px] font-bold text-[#004ac6] tracking-tight">ChasquiMoto</h1>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-5 pt-20 md:pt-24 pb-12">
  <div class="w-full max-w-sm sm:max-w-md text-center">
    <div class="animate-float">
      <span class="material-symbols-outlined text-[#004ac6] text-[64px] md:text-[80px]" style="font-variation-settings:'FILL' 1;">motorcycle</span>
    </div>
    <h2 class="text-[24px] md:text-[32px] md:leading-[40px] font-bold text-[#191b23] mt-6 md:mt-8">Movilidad Sostenible</h2>
    <p class="text-base md:text-lg leading-6 md:leading-7 text-[#434655] mt-2 md:mt-3">La forma más inteligente de moverte en la ciudad.</p>
    <div class="flex flex-col gap-3 md:gap-4 mt-8 md:mt-10">
      <a href="login.html" class="w-full h-14 bg-[#004ac6] text-white text-lg font-semibold rounded-xl shadow-[0_4px_12px_rgba(0,74,198,0.2)] hover:bg-[#2563eb] active:scale-[0.98] transition-all flex items-center justify-center gap-2 no-underline">
        <span>Iniciar Sesión</span>
        <span class="material-symbols-outlined">arrow_forward</span>
      </a>
      <a href="registro.html" class="w-full h-14 bg-[#ededf9] text-[#191b23] text-lg font-semibold rounded-xl border border-[#c3c6d7] hover:bg-[#e7e7f3] active:scale-[0.98] transition-all flex items-center justify-center gap-2 no-underline">
        <span>Crear Cuenta</span>
      </a>
    </div>
  </div>
</main>
<div class="fixed top-[15%] -left-16 md:-left-24 w-48 h-48 md:w-64 md:h-64 bg-[#004ac6]/5 rounded-full blur-[60px] md:blur-[80px] pointer-events-none"></div>
<div class="fixed bottom-[10%] -right-16 md:-right-24 w-64 h-64 md:w-96 md:h-96 bg-[#545f73]/5 rounded-full blur-[80px] md:blur-[100px] pointer-events-none"></div>
<script src="assets/app.js"></script>
<script>
const _session = APP.getSession();
if (_session) {
  const banner = document.createElement('div');
  banner.className = 'fixed top-0 left-0 right-0 z-50 bg-[#e8f5e9] text-[#2e7d32] text-sm text-center py-2 px-4 font-medium';
  banner.innerHTML = `Ya has iniciado sesión. <a href="${_session.role === 'driver' ? 'conductor.html' : 'principal.html'}" class="underline font-semibold">Ir a la app</a> o <a href="login.html" class="underline font-semibold">cambiar de cuenta</a>.`;
  document.body.prepend(banner);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ChasquiMoto - Crear Cuenta</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,100..700,0..1&display=swap" rel="stylesheet"/>
<link href="assets/styles.css" rel="stylesheet"/>
<style>
.role-btn .role-label { font-size: 14px; font-weight: 600; color: #434655; }
.role-btn.active .role-label { color: #004ac6; }
.role-btn .role-desc { font-size: 11px; color: #737686; text-align: center; line-height: 1.3; }
.role-btn.active .role-desc { color: #434655; }
</style>
</head>
<body class="auth-page bg-surface overflow-x-hidden">
<header class="fixed top-0 left-0 right-0 z-50 flex items-center px-4 h-14 bg-surface/80 backdrop-blur-md auth-header-bg">
  <a href="login.html" class="flex items-center justify-center w-10 h-10 -ml-2 text-[#191b23] hover:bg-[#f3f3fe] rounded-full transition-colors active:scale-95">
    <span class="material-symbols-outlined">arrow_back</span>
  </a>
  <span class="ml-2 text-lg font-semibold text-[#004ac6]">ChasquiMoto</span>
</header>
<main class="flex-1 flex flex-col w-full px-5 pt-20 pb-6 overflow-y-auto">
  <div class="auth-card">
    <div class="mb-5 text-center md:text-left">
      <h1 class="text-[24px] md:text-[32px] leading-[32px] md:leading-[40px] font-bold text-[#191b23] mb-1">Crear Cuenta</h1>
      <p class="text-base leading-6 text-[#434655]">Únete a la revolución de la movilidad sostenible.</p>
    </div>

    <div id="reg-error" class="hidden bg-[#ffdad6] text-[#93000a] text-sm font-medium rounded-xl p-3 text-center mb-4"></div>
    <div id="reg-success" class="hidden bg-[#d1fae5] text-[#065f46] text-sm font-medium rounded-xl p-3 text-center mb-4"></div>

    <form id="reg-form" class="flex flex-col gap-4">
      <div>
        <label class="text-sm font-medium text-[#434655] ml-1 block mb-1.5">Tipo de cuenta</label>
        <div class="flex gap-3">
          <button type="button" id="role-user" class="role-btn active" data-role="user">
            <span class="material-symbols-outlined text-[#004ac6]" style="font-variation-settings:'FILL' 1;">person</span>
            <span class="role-label">Usuario</span>
            <span class="role-desc">Solicito viajes</span>
          </button>
          <button type="button" id="role-driver" class="role-btn" data-role="driver">
            <span class="material-symbols-outlined text-[#545f73]">motorcycle</span>
            <span class="role-label">Conductor</span>
            <span class="role-desc">Ofrezco viajes</span>
          </button>
        </div>
      </div>

      <div>
        <label class="text-sm font-medium text-[#434655] ml-1 block mb-1" for="name">Nombre Completo</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-[#737686]">
            <span class="material-symbols-outlined">person</span>
          </div>
          <input class="w-full h-14 pl-12 pr-4 bg-[#ededf9] md:bg-[#f3f3fe] rounded-xl border-none text-[#191b23] placeholder:text-[#c3c6d7] focus:ring-2 focus:ring-[#004ac6] transition-all outline-none" id="name" name="name" placeholder="Ej. Juan Pérez" required type="text"/>
        </div>
      </div>

      <div>
        <label class="text-sm font-medium text-[#434655] ml-1 block mb-1" for="email">Correo Electrónico</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-[#737686]">
            <span class="material-symbols-outlined">mail</span>
          </div>
          <input class="w-full h-14 pl-12 pr-4 bg-[#ededf9] md:bg-[#f3f3fe] rounded-xl border-none text-[#191b23] placeholder:text-[#c3c6d7] focus:ring-2 focus:ring-[#004ac6] transition-all outline-none" id="email" name="email" placeholder="nombre@ejemplo.com" required type="email"/>
        </div>
      </div>

      <div>
        <label class="text-sm font-medium text-[#434655] ml-1 block mb-1" for="phone">Teléfono</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-[#737686]">
            <span class="material-symbols-outlined">smartphone</span>
          </div>
          <input class="w-full h-14 pl-12 pr-4 bg-[#ededf9] md:bg-[#f3f3fe] rounded-xl border-none text-[#191b23] placeholder:text-[#c3c6d7] focus:ring-2 focus:ring-[#004ac6] transition-all outline-none" id="phone" name="phone" placeholder="+52 55 0000 0000" required type="tel"/>
        </div>
      </div>

      <div>
        <label class="text-sm font-medium text-[#434655] ml-1 block mb-1" for="password">Contraseña</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-[#737686]">
            <span class="material-symbols-outlined">lock</span>
          </div>
          <input class="w-full h-14 pl-12 pr-12 bg-[#ededf9] md:bg-[#f3f3fe] rounded-xl border-none text-[#191b23] placeholder:text-[#c3c6d7] focus:ring-2 focus:ring-[#004ac6] transition-all outline-none" id="password" name="password" placeholder="••••••••" required type="password"/>
          <button class="absolute inset-y-0 right-4 flex items-center text-[#c3c6d7] hover:text-[#737686] transition-colors" type="button" id="toggle-pass">
            <span class="material-symbols-outlined">visibility</span>
          </button>
        </div>
      </div>

      <div id="driver-fields" class="hidden flex-col gap-4 p-4 bg-[#f3f3fe] rounded-xl">
        <p class="text-sm font-semibold text-[#004ac6]">Información del vehículo</p>
        <div>
          <label class="text-sm font-medium text-[#434655] ml-1 block mb-1" for="car-model">Modelo</label>
          <input class="w-full h-12 px-4 bg-white rounded-xl border border-[#c3c6d7] text-[#191b23] placeholder:text-[#c3c6d7] focus:ring-2 focus:ring-[#004ac6] transition-all outline-none" id="car-model" placeholder="Ej. Toyota Prius"/>
        </div>
        <div>
          <label class="text-sm font-medium text-[#434655] ml-1 block mb-1" for="car-color">Color</label>
          <input class="w-full h-12 px-4 bg-white rounded-xl border border-[#c3c6d7] text-[#191b23] placeholder:text-[#c3c6d7] focus:ring-2 focus:ring-[#004ac6] transition-all outline-none" id="car-color" placeholder="Ej. Plata"/>
        </div>
        <div>
          <label class="text-sm font-medium text-[#434655] ml-1 block mb-1" for="car-plate">Placa</label>
          <input class="w-full h-12 px-4 bg-white rounded-xl border border-[#c3c6d7] text-[#191b23] placeholder:text-[#c3c6d7] focus:ring-2 focus:ring-[#004ac6] transition-all outline-none" id="car-plate" placeholder="Ej. ABC-123"/>
        </div>
      </div>

      <div class="mt-1">
        <button class="w-full h-14 bg-[#004ac6] text-white text-lg font-semibold rounded-xl shadow-[0_4px_12px_rgba(0,74,198,0.2)] hover:bg-[#2563eb] active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
          <span id="reg-btn-text">Registrarse</span>
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
      </div>

      <p class="text-center text-xs text-[#737686] px-4">
        Al registrarte, aceptas nuestros <a class="text-[#004ac6] hover:underline" href="#">Términos</a> y <a class="text-[#004ac6] hover:underline" href="#">Privacidad</a>.
      </p>
    </form>

    <div class="mt-5 text-center">
      <a href="login.html" class="text-base text-[#434655] hover:text-[#004ac6] inline-flex items-center gap-1">
        ¿Ya tienes cuenta? <span class="text-[#004ac6] font-semibold">Inicia sesión</span>
      </a>
    </div>
  </div>
</main>
<div class="fixed -bottom-24 -left-24 w-48 h-48 md:w-64 md:h-64 bg-[#004ac6]/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed -top-24 -right-24 w-64 h-64 md:w-80 md:h-80 bg-[#d5e0f8]/10 rounded-full blur-3xl pointer-events-none"></div>
<script src="assets/app.js"></script>
<script>
const _sess = APP.getSession();
if (_sess) {
  const b = document.createElement('div');
  b.className = 'fixed top-0 left-0 right-0 z-50 bg-[#e8f5e9] text-[#2e7d32] text-sm text-center py-2 px-4 font-medium';
  b.innerHTML = `Ya has iniciado sesión. <a href="${_sess.role === 'driver' ? 'conductor.html' : 'principal.html'}" class="underline font-semibold">Ir a la app</a>`;
  document.body.prepend(b);
}

let selectedRole = 'user';

document.getElementById('role-user').addEventListener('click', () => {
  selectedRole = 'user';
  document.getElementById('role-user').classList.add('active');
  document.getElementById('role-driver').classList.remove('active');
  document.getElementById('role-user').querySelector('.material-symbols-outlined').style.color = '#004ac6';
  document.getElementById('role-driver').querySelector('.material-symbols-outlined').style.color = '#545f73';
  document.getElementById('driver-fields').classList.add('hidden');
  document.getElementById('driver-fields').classList.remove('flex');
  document.getElementById('reg-btn-text').textContent = 'Registrarse';
});

document.getElementById('role-driver').addEventListener('click', () => {
  selectedRole = 'driver';
  document.getElementById('role-driver').classList.add('active');
  document.getElementById('role-user').classList.remove('active');
  document.getElementById('role-driver').querySelector('.material-symbols-outlined').style.color = '#004ac6';
  document.getElementById('role-user').querySelector('.material-symbols-outlined').style.color = '#545f73';
  document.getElementById('driver-fields').classList.remove('hidden');
  document.getElementById('driver-fields').classList.add('flex');
  document.getElementById('reg-btn-text').textContent = 'Registrarse como Conductor';
});

document.querySelectorAll('input').forEach(input => {
  input.addEventListener('focus', () => {
    const parent = input.closest('.relative') || input.parentElement;
    parent.classList.add('scale-[1.01]');
  });
  input.addEventListener('blur', () => {
    const parent = input.closest('.relative') || input.parentElement;
    parent.classList.remove('scale-[1.01]');
  });
});

document.getElementById('toggle-pass').addEventListener('click', () => {
  const pass = document.getElementById('password');
  const isPass = pass.type === 'password';
  pass.type = isPass ? 'text' : 'password';
  document.getElementById('toggle-pass').querySelector('span').textContent = isPass ? 'visibility_off' : 'visibility';
});

document.getElementById('reg-form').addEventListener('submit', (e) => {
  e.preventDefault();

  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const phone = document.getElementById('phone').value;
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('reg-error');
  const successEl = document.getElementById('reg-success');
  const btn = document.querySelector('button[type="submit"]');

  errorEl.classList.add('hidden');
  successEl.classList.add('hidden');

  if (!name || !email || !phone || !password) {
    errorEl.textContent = 'Todos los campos son obligatorios.';
    errorEl.classList.remove('hidden');
    return;
  }

  const result = APP.register(name, email, phone, password, selectedRole);

  if (!result.success) {
    errorEl.textContent = result.error;
    errorEl.classList.remove('hidden');
    return;
  }

  if (selectedRole === 'driver') {
    const carModel = document.getElementById('car-model').value;
    const carColor = document.getElementById('car-color').value;
    const carPlate = document.getElementById('car-plate').value;
    if (carModel && carColor && carPlate) {
      const users = APP.getUsers();
      const driver = users.find(u => u.email === email);
      if (driver) {
        driver.car = { model: carModel, color: carColor, plate: carPlate };
        APP.saveUsers(users);
      }
    }
  }

  successEl.textContent = 'Cuenta creada con éxito. Redirigiendo...';
  successEl.classList.remove('hidden');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';

  setTimeout(() => {
    window.location.href = 'login.html';
  }, 1500);
});
</script>
</body>
</html>

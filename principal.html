<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>ChasquiMoto - Viajes</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@20..48,100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet"/>
<link href="assets/styles.css" rel="stylesheet"/>
<style>
html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; }
#map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 0; }
.leaflet-control-zoom a { background: white !important; color: #191b23 !important; }
.leaflet-popup-content-wrapper { border-radius: 12px !important; font-family: 'Inter', sans-serif !important; }
.leaflet-popup-content { margin: 12px 16px !important; font-size: 14px !important; }
.map-ui { position: absolute; left: 0; right: 0; bottom: 0; z-index: 10; padding: 0 12px calc(72px + env(safe-area-inset-bottom, 0px)); pointer-events: none; }
.map-ui > * { pointer-events: auto; }
@media (min-width: 640px) { .map-ui { padding: 0 16px calc(80px + env(safe-area-inset-bottom, 0px)); } }
@media (min-width: 768px) { .map-ui { max-width: 400px; left: 24px; right: auto; bottom: 100px; padding: 0; } }
@media (min-width: 1024px) { .map-ui { max-width: 420px; left: 40px; bottom: 120px; } }
.status-badge { background: white; border-radius: 100px; padding: 6px 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); display: inline-flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; }
</style>
</head>
<body>
<div id="map"></div>

<header class="fixed top-0 left-0 right-0 z-[1000] bg-white/80 backdrop-blur-md shadow-sm flex items-center justify-between px-3 h-11 md:px-5 md:h-14">
  <button id="menu-btn" class="material-symbols-outlined text-[#004ac6] hover:bg-[#f3f3fe] transition-colors active:scale-95 p-1.5 md:p-2 rounded-full text-[22px] md:text-[24px]">menu</button>
  <h1 class="text-[22px] md:text-[24px] font-bold text-[#004ac6] tracking-tight">ChasquiMoto</h1>
  <div class="relative">
    <button id="avatar-btn" class="w-7 h-7 md:w-8 md:h-8 rounded-full overflow-hidden border-2 border-[#2563eb] bg-[#004ac6] text-white text-xs font-medium md:text-sm flex items-center justify-center cursor-pointer hover:opacity-80 transition-opacity"></button>
    <div id="dropdown-menu" class="hidden absolute right-0 mt-2 w-48 md:w-56 bg-white rounded-xl shadow-[0_10px_30px_rgba(30,41,59,0.15)] border border-[#c3c6d7]/50 overflow-hidden z-[1001]">
      <div class="px-3 md:px-4 py-2 md:py-3 border-b border-[#c3c6d7]/30">
        <p id="drop-name" class="text-sm font-medium text-[#191b23] truncate"></p>
        <p id="drop-email" class="text-xs text-[#434655] truncate"></p>
        <span id="drop-role" class="inline-block mt-1.5 text-[10px] font-semibold px-2 py-0.5 rounded-full bg-[#d5e0f8] text-[#004ac6]"></span>
      </div>
      <button id="logout-btn" class="w-full flex items-center gap-2 md:gap-3 px-3 md:px-4 py-2.5 md:py-3 text-sm md:text-base text-[#191b23] hover:bg-[#ffdad6]/20 hover:text-[#ba1a1a] transition-colors">
        <span class="material-symbols-outlined text-[#737686] text-[20px] md:text-[24px]">logout</span>
        Cerrar Sesión
      </button>
    </div>
  </div>
</header>

<div id="status-bar" class="fixed top-14 md:top-16 left-1/2 -translate-x-1/2 z-[500] hidden">
  <div class="status-badge">
    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse-dot"></span>
    <span class="text-[#434655]" id="status-text">Conductores disponibles cerca</span>
  </div>
</div>

<div class="map-ui" id="dest-card">
  <div class="flex gap-2 md:gap-3 mb-2 md:mb-4 overflow-x-auto hide-scrollbar">
    <button id="btn-home" class="bg-white shadow-md hover:bg-[#f3f3fe] transition-all active:scale-90 flex items-center gap-1.5 md:gap-2 px-3 md:px-4 py-2 md:py-2.5 rounded-xl border border-[#c3c6d7]/50 whitespace-nowrap flex-shrink-0">
      <span class="material-symbols-outlined text-[#004ac6] text-[18px] md:text-[22px]">home</span>
      <span class="text-xs md:text-sm font-medium text-[#191b23]">Home</span>
    </button>
    <button id="btn-work" class="bg-white shadow-md hover:bg-[#f3f3fe] transition-all active:scale-90 flex items-center gap-1.5 md:gap-2 px-3 md:px-4 py-2 md:py-2.5 rounded-xl border border-[#c3c6d7]/50 whitespace-nowrap flex-shrink-0">
      <span class="material-symbols-outlined text-[#004ac6] text-[18px] md:text-[22px]">work</span>
      <span class="text-xs md:text-sm font-medium text-[#191b23]">Office</span>
    </button>
  </div>

  <div class="bg-white rounded-2xl p-3 md:p-4 shadow-[0_10px_30px_rgba(30,41,59,0.15)]">
    <div id="ride-form-view">
      <form id="search-form" class="flex items-center gap-2 md:gap-3 bg-[#f3f3fe] rounded-xl px-3 md:px-4 py-3 md:py-3.5 hover:bg-[#e7e7f3] transition-colors cursor-text">
        <span class="material-symbols-outlined text-[#004ac6] text-[20px] md:text-[24px]">search</span>
        <input id="dest-input" type="text" placeholder="¿A dónde vamos?" class="flex-1 bg-transparent border-none outline-none text-sm md:text-base text-[#191b23] placeholder:text-[#737686] min-w-0"/>
      </form>
      <div id="route-info" class="mt-3 hidden">
        <div class="flex justify-between items-center bg-[#f9f9ff] rounded-xl p-3 md:p-4">
          <div class="min-w-0 flex-1">
            <p class="text-xs text-[#434655] font-medium">Distancia</p>
            <p id="dist-value" class="text-lg md:text-xl font-semibold text-[#191b23]">--</p>
          </div>
          <div class="text-right min-w-0 flex-1">
            <p class="text-xs text-[#434655] font-medium">Tiempo</p>
            <p id="time-value" class="text-lg md:text-xl font-semibold text-[#191b23]">--</p>
          </div>
        </div>
        <button id="request-ride-btn" class="w-full mt-3 h-12 md:h-13 bg-[#004ac6] text-white text-sm md:text-base font-semibold rounded-xl shadow-[0_4px_12px_rgba(0,74,198,0.2)] hover:bg-[#2563eb] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
          <span class="material-symbols-outlined">motorcycle</span>
          <span>Solicitar Viaje</span>
        </button>
      </div>
    </div>

    <div id="ride-status-view" class="hidden"></div>
  </div>
</div>

<nav class="fixed bottom-0 left-0 right-0 z-[1000] rounded-t-xl bg-white/90 backdrop-blur-md shadow-[0_-2px_12px_rgba(30,41,59,0.1)] flex justify-around items-center pb-safe pt-1 md:pt-1.5 px-3 md:px-5">
  <button class="flex flex-col items-center gap-0.5 text-[#004ac6] py-1.5 md:py-2 hover:bg-[#d5e0f8]/20 transition-all active:scale-90 min-w-0">
    <span class="material-symbols-outlined text-[20px] md:text-[24px]" style="font-variation-settings:'FILL' 1;">motorcycle</span>
    <span class="text-[10px] md:text-xs font-semibold">Home</span>
  </button>
  <button class="flex flex-col items-center gap-0.5 text-[#545f73] py-1.5 md:py-2 hover:bg-[#d5e0f8]/20 transition-all active:scale-90 min-w-0">
    <span class="material-symbols-outlined text-[20px] md:text-[24px]">history</span>
    <span class="text-[10px] md:text-xs font-semibold">Trips</span>
  </button>
  <button class="flex flex-col items-center gap-0.5 text-[#545f73] py-1.5 md:py-2 hover:bg-[#d5e0f8]/20 transition-all active:scale-90 min-w-0">
    <span class="material-symbols-outlined text-[20px] md:text-[24px]">person</span>
    <span class="text-[10px] md:text-xs font-semibold">Profile</span>
  </button>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="assets/app.js"></script>
<script>
const user = APP.requireRole('user');
if (user) {
  document.getElementById('avatar-btn').textContent = user.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  document.getElementById('drop-name').textContent = user.name;
  document.getElementById('drop-email').textContent = user.email;
  document.getElementById('drop-role').textContent = 'Usuario';
}

document.getElementById('avatar-btn').addEventListener('click', () => {
  document.getElementById('dropdown-menu').classList.toggle('hidden');
});
document.addEventListener('click', (e) => {
  if (!e.target.closest('#avatar-btn') && !e.target.closest('#dropdown-menu')) {
    document.getElementById('dropdown-menu').classList.add('hidden');
  }
});
document.getElementById('logout-btn').addEventListener('click', () => APP.logout());

const navButtons = document.querySelectorAll('nav button');
navButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    navButtons.forEach(b => {
      b.classList.replace('text-[#004ac6]', 'text-[#545f73]');
      b.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 0";
    });
    btn.classList.replace('text-[#545f73]', 'text-[#004ac6]');
    btn.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 1";
  });
});

let map, userMarker, routeLine, destMarker;
let userCoords = null;
let currentDestCoords = null;
let currentDestName = '';
let rideRequestId = null;
let simulationTimer = null;

function initMap(lat, lng) {
  const w = window.innerWidth;
  map = L.map('map', {
    center: [lat, lng],
    zoom: w < 640 ? 13 : w < 1024 ? 14 : 15,
    zoomControl: w >= 768,
    attributionControl: false
  });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

  const icon = L.divIcon({
    html: '<div style="background:#004ac6;width:16px;height:16px;border:3px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.3)"></div>',
    iconSize: [16, 16], iconAnchor: [8, 8], className: ''
  });
  userMarker = L.marker([lat, lng], { icon }).addTo(map).bindPopup('Estás aquí').openPopup();
  userCoords = [lat, lng];
  document.getElementById('status-bar').classList.remove('hidden');
  setTimeout(() => map.invalidateSize(), 100);
}

function getLocation() {
  if (!navigator.geolocation) { initMap(-12.0464, -77.0428); return; }
  let geoDone = false;
  setTimeout(() => { if (!geoDone) { geoDone = true; initMap(-12.0464, -77.0428); } }, 5000);
  navigator.geolocation.getCurrentPosition(
    p => { if (!geoDone) { geoDone = true; initMap(p.coords.latitude, p.coords.longitude); } },
    () => { if (!geoDone) { geoDone = true; initMap(-12.0464, -77.0428); } },
    { enableHighAccuracy: false, timeout: 4000, maximumAge: 120000 }
  );
}

function searchPlace(q) {
  return fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=5`).then(r => r.json());
}

function getRoute(fLat, fLng, tLat, tLng) {
  return fetch(`https://router.project-osrm.org/route/v1/driving/${fLng},${fLat};${tLng},${tLat}?overview=full&geometries=geojson`).then(r => r.json());
}

function fmtDist(m) { return m >= 1000 ? `${(m/1000).toFixed(1)} km` : `${Math.round(m)} m`; }
function fmtTime(s) {
  const m = Math.round(s/60);
  return m >= 60 ? `${Math.floor(m/60)}h ${m%60}min` : `${m} min`;
}

function resetUI() {
  if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
  if (destMarker) { map.removeLayer(destMarker); destMarker = null; }
  document.getElementById('route-info').classList.add('hidden');
  document.getElementById('ride-form-view').classList.remove('hidden');
  document.getElementById('ride-status-view').classList.add('hidden');
  document.getElementById('ride-status-view').innerHTML = '';
  document.getElementById('dest-input').value = '';
  currentDestCoords = null;
  currentDestName = '';
  rideRequestId = null;
  pollCleanup();
}

function showRoute(destLat, destLng, destName) {
  if (!userCoords) return;
  if (routeLine) map.removeLayer(routeLine);
  if (destMarker) map.removeLayer(destMarker);
  currentDestCoords = [destLat, destLng];
  currentDestName = destName;

  const icon = L.divIcon({
    html: '<div style="background:#bc4800;width:14px;height:14px;border:3px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.3)"></div>',
    iconSize: [14, 14], iconAnchor: [7, 7], className: ''
  });
  destMarker = L.marker([destLat, destLng], { icon }).addTo(map).bindPopup(destName).openPopup();

  getRoute(userCoords[0], userCoords[1], destLat, destLng).then(data => {
    if (!data || !data.routes || !data.routes[0]) return;
    const r = data.routes[0];
    const coords = r.geometry.coordinates.map(c => [c[1], c[0]]);
    routeLine = L.polyline(coords, { color: '#004ac6', weight: 5, opacity: 0.8 }).addTo(map);
    map.fitBounds(routeLine.getBounds().pad(0.15));
    document.getElementById('dist-value').textContent = fmtDist(r.distance);
    document.getElementById('time-value').textContent = fmtTime(r.duration);
    document.getElementById('route-info').classList.remove('hidden');
  });
}

let ridePollInterval = null;
let rideNotifiedStatus = null;

function startRidePolling(initialStatus) {
  stopRidePolling();
  rideNotifiedStatus = initialStatus || null;
  ridePollInterval = setInterval(checkRideStatus, 2000);
}

function stopRidePolling() {
  if (ridePollInterval) { clearInterval(ridePollInterval); ridePollInterval = null; }
}

function pollCleanup() {
  stopRidePolling();
  if (simulationTimer) { simulationTimer.cancel(); simulationTimer = null; }
}

function checkRideStatus() {
  if (!rideRequestId) { stopRidePolling(); return; }
  const ride = APP.getRides().find(r => r.id === rideRequestId);
  if (!ride) { stopRidePolling(); return; }

  if (ride.status === 'accepted' && rideNotifiedStatus !== 'accepted') {
    rideNotifiedStatus = 'accepted';
    const driver = APP.getDriverByEmail(ride.driverEmail);
    if (driver) showDriverFound(driver);
  }

  if (ride.status === 'arrived' && rideNotifiedStatus !== 'arrived') {
    rideNotifiedStatus = 'arrived';
    showDriverArrived();
  }

  if (ride.status === 'completed' && rideNotifiedStatus !== 'completed') {
    rideNotifiedStatus = 'completed';
    stopRidePolling();
    completedTripView();
  }
}

function requestRide() {
  if (!currentDestCoords || !userCoords) return;

  const ride = APP.createRide(
    user.email,
    'Tu ubicación',
    currentDestName,
    userCoords,
    currentDestCoords
  );
  rideRequestId = ride.id;

  document.getElementById('ride-form-view').classList.add('hidden');
  const statusView = document.getElementById('ride-status-view');
  statusView.classList.remove('hidden');

  statusView.innerHTML = `
    <div class="text-center py-6 animate-slide-up">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-[#eeefff] rounded-full mb-4 animate-search-pulse">
        <span class="material-symbols-outlined text-[#004ac6] text-[32px]" style="font-variation-settings:'FILL' 1;">radar</span>
      </div>
      <p class="text-base font-semibold text-[#191b23]">Buscando conductor</p>
      <p class="text-sm text-[#434655] mt-1">Esperando a que un conductor acepte tu solicitud...</p>
    </div>
  `;

  document.getElementById('status-text').textContent = 'Buscando conductor...';

  startRidePolling();
}

function showDriverFound(driver) {
  const statusView = document.getElementById('ride-status-view');
  statusView.innerHTML = `
    <div class="animate-slide-up">
      <div class="flex items-center gap-3 p-3 bg-[#f0f7ff] rounded-xl">
        <div class="w-12 h-12 rounded-full bg-[#004ac6] text-white flex items-center justify-center text-lg font-bold flex-shrink-0">
          ${driver.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2)}
        </div>
        <div class="min-w-0 flex-1">
          <p class="text-sm font-semibold text-[#191b23]">${driver.name}</p>
          <p class="text-xs text-[#434655]">${driver.car.color} ${driver.car.model} · ${driver.car.plate}</p>
          <div class="flex items-center gap-1 mt-0.5">
            <span class="material-symbols-outlined text-[13px] text-[#f59e0b]" style="font-variation-settings:'FILL' 1;">star</span>
            <span class="text-xs text-[#434655]">${driver.rating} · ${driver.rides} viajes</span>
          </div>
        </div>
      </div>
      <div class="mt-3 text-center">
        <p class="text-sm font-medium text-[#191b23]">Conductor asignado</p>
        <p class="text-xs text-[#434655] mt-0.5">Se dirige a tu ubicación...</p>
        <div class="mt-2 flex items-center justify-center gap-4 text-xs text-[#434655]">
          <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">motorcycle</span> 2 min</span>
          <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">location_on</span> 0.5 km</span>
        </div>
      </div>
    </div>
  `;
  document.getElementById('status-text').textContent = 'Conductor en camino';
}

function showDriverArrived() {
  const statusView = document.getElementById('ride-status-view');
  statusView.innerHTML = `
    <div class="animate-slide-up">
      <div class="flex items-center gap-3 p-3 bg-[#e8f5e9] rounded-xl mb-3">
        <span class="material-symbols-outlined text-[#2e7d32] text-[28px]" style="font-variation-settings:'FILL' 1;">check_circle</span>
        <div>
          <p class="text-sm font-semibold text-[#191b23]">Conductor llegó</p>
          <p class="text-xs text-[#434655]">Ya está en tu ubicación</p>
        </div>
      </div>
      <button id="start-trip-btn" class="w-full h-12 bg-[#004ac6] text-white text-sm font-semibold rounded-xl shadow-[0_4px_12px_rgba(0,74,198,0.2)] hover:bg-[#2563eb] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
        <span class="material-symbols-outlined">play_arrow</span>
        Iniciar Viaje
      </button>
    </div>
  `;
  document.getElementById('status-text').textContent = 'Conductor llegó';

  document.getElementById('start-trip-btn').addEventListener('click', () => {
    APP.startTrip(rideRequestId);
    currentTripView();
  });
}

function currentTripView() {
  const statusView = document.getElementById('ride-status-view');
  statusView.innerHTML = `
    <div class="animate-slide-up">
      <div class="flex items-center gap-3 p-3 bg-[#e8f5e9] rounded-xl mb-3">
        <div class="animate-pulse-dot w-3 h-3 bg-[#2e7d32] rounded-full flex-shrink-0"></div>
        <div>
          <p class="text-sm font-semibold text-[#191b23]">En viaje</p>
          <p class="text-xs text-[#434655]">Dirigiéndose a ${currentDestName}</p>
        </div>
      </div>
      <div class="p-3 bg-[#f9f9ff] rounded-xl text-center">
        <p class="text-xs text-[#434655]">Tiempo estimado de llegada</p>
        <p id="eta-display" class="text-2xl font-bold text-[#004ac6] mt-1">5 min</p>
      </div>
    </div>
  `;

  document.getElementById('status-text').textContent = 'En viaje';
  startRidePolling('in_progress');
}

function completedTripView() {
  pollCleanup();
  const statusView = document.getElementById('ride-status-view');
  statusView.innerHTML = `
    <div class="animate-slide-up text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-[#e8f5e9] rounded-full mb-3">
        <span class="material-symbols-outlined text-[#2e7d32] text-[36px]" style="font-variation-settings:'FILL' 1;">check_circle</span>
      </div>
      <p class="text-lg font-bold text-[#191b23]">Viaje completado</p>
      <p class="text-sm text-[#434655] mt-1">Gracias por viajar con ChasquiMoto</p>
      <button id="new-ride-btn" class="mt-4 w-full h-12 bg-[#004ac6] text-white text-sm font-semibold rounded-xl hover:bg-[#2563eb] active:scale-[0.98] transition-all">
        Nuevo Viaje
      </button>
    </div>
  `;
  document.getElementById('status-bar').classList.add('hidden');
  document.getElementById('status-text').textContent = 'Viaje completado';

  document.getElementById('new-ride-btn').addEventListener('click', () => {
    resetUI();
    document.getElementById('status-bar').classList.remove('hidden');
    document.getElementById('status-text').textContent = 'Conductores disponibles cerca';
  });
}

document.getElementById('search-form').addEventListener('submit', (e) => {
  e.preventDefault();
  const q = document.getElementById('dest-input').value;
  if (!q.trim()) return;
  searchPlace(q).then(results => {
    if (!results || results.length === 0) { alert('No se encontr\u00f3 el lugar.'); return; }
    const p = results[0];
    showRoute(parseFloat(p.lat), parseFloat(p.lon), p.display_name);
  });
});

document.getElementById('request-ride-btn').addEventListener('click', requestRide);

document.getElementById('btn-home').addEventListener('click', () => {
  searchPlace('Miraflores, Lima, Perú').then(r => {
    if (r && r[0]) showRoute(parseFloat(r[0].lat), parseFloat(r[0].lon), r[0].display_name);
  });
});
document.getElementById('btn-work').addEventListener('click', () => {
  searchPlace('San Isidro, Lima, Perú').then(r => {
    if (r && r[0]) showRoute(parseFloat(r[0].lat), parseFloat(r[0].lon), r[0].display_name);
  });
});

window.addEventListener('resize', () => { if (map) setTimeout(() => map.invalidateSize(), 50); });
getLocation();
</script>
</body>
</html>
